kind = "web"
previewPath = "/"
title = "ShopScript"
version = "1.0.0"
id = "artifacts/shopscript"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18102

[services.development]
run = "pnpm --filter @workspace/shopscript run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shopscript", "run", "build" ]
publicDir = "artifacts/shopscript/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18102"
BASE_PATH = "/"
